<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профессиональный Калькулятор Калорий</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --protein: #FF8008;
            --fat: #FFC837;
            --carb: #00c6ff;
            --text-dark: #2C3E50;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shield: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Основной контейнер */
        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 50px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #2C3E50, #000000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        /* Навигация (Табы) */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 4px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transform: scale(1.02);
        }

        /* Стили панелей */
        .tab-panel {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Виджет прогресса БЖУ */
        .summary-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.02);
        }

        .main-calories {
            text-align: center;
            margin-bottom: 20px;
        }

        .main-calories .value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2c3e50;
        }

        .main-calories .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .bju-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bju-bar-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bju-label {
            width: 80px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .progress-track {
            flex: 1;
            height: 10px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            margin: 0 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bju-val {
            font-size: 0.9rem;
            font-weight: 700;
            width: 60px;
            text-align: right;
        }

        /* Формы и Инпуты */
        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            background: white;
            border-color: #23a6d5;
            box-shadow: 0 0 0 3px rgba(35, 166, 213, 0.2);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .bju-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #23a6d5, #23d5ab);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(35, 166, 213, 0.3);
        }

        .btn-danger {
            background: rgba(255, 107, 107, 0.2);
            color: #e73c7e;
            padding: 6px 12px;
            font-size: 0.8rem;
            width: auto;
        }

        .btn-danger:hover {
            background: #e73c7e;
            color: white;
        }

        /* Списки записей / Продуктов */
        .list-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 25px 0 15px 0;
            opacity: 0.9;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Стилизация скроллбара */
        .item-list::-webkit-scrollbar {
            width: 6px;
        }
        .item-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.02);
            border-radius: 10px;
        }
        .item-list::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .card-item {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        .card-item:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateX(3px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .card-info .name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .card-info .details {
            font-size: 0.8rem;
            opacity: 0.7;
            font-weight: 500;
        }

        .bju-badges {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
            color: white;
        }

        .badge-p { background: var(--protein); }
        .badge-f { background: var(--fat); }
        .badge-c { background: var(--carb); }

        .card-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: rgba(0,0,0,0.05);
        }

        /* Поиск / Фильтр */
        .search-box {
            margin-bottom: 15px;
        }

        /* Модальное окно редактирования */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            padding: 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 1px solid white;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* История */
        .history-day {
            margin-bottom: 20px;
            background: rgba(255,255,255,0.25);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .history-date {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Калькулятор Калорий</h1>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('diary')">Дневник</button>
            <button class="tab-btn" onclick="switchTab('products')">База Блюд</button>
            <button class="tab-btn" onclick="switchTab('history')">История</button>
        </nav>

        <div id="diary" class="tab-panel active">
            <div class="summary-card">
                <div class="main-calories">
                    <div class="value" id="total-calories">0</div>
                    <div class="label">ккал съедено сегодня</div>
                </div>
                <div class="bju-bars">
                    <div class="bju-bar-item">
                        <span class="bju-label">Белки</span>
                        <div class="progress-track"><div id="bar-protein" class="progress-fill" style="background: var(--protein);"></div></div>
                        <span class="bju-val" id="total-protein">0 г</span>
                    </div>
                    <div class="bju-bar-item">
                        <span class="bju-label">Жиры</span>
                        <div class="progress-track"><div id="bar-fat" class="progress-fill" style="background: var(--fat);"></div></div>
                        <span class="bju-val" id="total-fat">0 г</span>
                    </div>
                    <div class="bju-bar-item">
                        <span class="bju-label">Углеводы</span>
                        <div class="progress-track"><div id="bar-carb" class="progress-fill" style="background: var(--carb);"></div></div>
                        <span class="bju-val" id="total-carb">0 г</span>
                    </div>
                </div>
            </div>

            <form id="add-log-form" onsubmit="addLogEntry(event)">
                <div class="form-group">
                    <label for="log-product-select">Выбрать продукт / блюдо</label>
                    <select id="log-product-select" required></select>
                </div>
                <div class="grid-inputs">
                    <div class="form-group">
                        <label for="log-weight">Вес (граммы)</label>
                        <input type="number" id="log-weight" min="1" placeholder="100" required>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn btn-primary">Добавить в дневник</button>
                    </div>
                </div>
            </form>

            <h3 class="list-section-title">Съедено сегодня</h3>
            <div id="diary-list" class="item-list">
                </div>
        </div>

        <div id="products" class="tab-panel">
            <div class="search-box">
                <input type="text" id="product-search" placeholder="Поиск по названию..." oninput="renderProductDatabase()">
            </div>

            <form id="create-product-form" onsubmit="createNewProduct(event)" style="background: rgba(255,255,255,0.3); padding: 15px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--glass-border);">
                <h4 style="margin-bottom: 10px; font-size: 0.95rem;">Создать новое блюдо / продукт</h4>
                <div class="form-group">
                    <input type="text" id="new-p-name" placeholder="Название продукта" required>
                </div>
                <div class="bju-grid">
                    <div class="form-group">
                        <label>Калории (100г)</label>
                        <input type="number" id="new-p-cal" min="0" placeholder="ккал" required>
                    </div>
                    <div class="form-group">
                        <label>Белки (100г)</label>
                        <input type="number" id="new-p-prot" step="0.1" min="0" placeholder="Б" required>
                    </div>
                    <div class="form-group">
                        <label>Жиры (100г)</label>
                        <input type="number" id="new-p-fat" step="0.1" min="0" placeholder="Ж" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Углеводы (100г)</label>
                    <input type="number" id="new-p-carb" step="0.1" min="0" placeholder="У" required>
                </div>
                <button type="submit" class="btn btn-primary" style="padding: 10px;">Сохранить в базу</button>
            </form>

            <h3 class="list-section-title">Все доступные продукты (на 100г)</h3>
            <div id="database-list" class="item-list">
                </div>
        </div>

        <div id="history" class="tab-panel">
            <h3 class="list-section-title">Архив питания по дням</h3>
            <div id="history-container">
                </div>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Редактирование продукта</h3>
            <form id="edit-product-form" onsubmit="saveProductEdit(event)">
                <input type="hidden" id="edit-p-id">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="edit-p-name" required>
                </div>
                <div class="form-group">
                    <label>Калории (на 100г)</label>
                    <input type="number" id="edit-p-cal" required>
                </div>
                <div class="bju-grid">
                    <div class="form-group">
                        <label>Белки (100г)</label>
                        <input type="number" id="edit-p-prot" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label>Жиры (100г)</label>
                        <input type="number" id="edit-p-fat" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label>Углеводы (100г)</label>
                        <input type="number" id="edit-p-carb" step="0.1" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" style="background: #ccc;" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Стандартная база продуктов (загружается, если в LocalStorage пусто)
        const DEFAULT_PRODUCTS = [
            { id: "1", name: "Куриное филе (отварное)", calories: 150, protein: 30, fat: 3, carbs: 0 },
            { id: "2", name: "Рис бурый (отварной)", calories: 110, protein: 2.6, fat: 0.9, carbs: 23 },
            { id: "3", name: "Яйцо куриное (1 шт)", calories: 75, protein: 6.5, fat: 5.5, carbs: 0.5 },
            { id: "4", name: "Овсяная каша на воде", calories: 88, protein: 3, fat: 1.7, carbs: 15 },
            { id: "5", name: "Творог 5%", calories: 121, protein: 17, fat: 5, carbs: 3.3 },
            { id: "6", name: "Банан", calories: 95, protein: 1.5, fat: 0.2, carbs: 22 },
            { id: "7", name: "Яблоко", calories: 52, protein: 0.3, fat: 0.2, carbs: 12 },
            { id: "8", name: "Миндаль", calories: 579, protein: 21, fat: 50, carbs: 22 },
            { id: "9", name: "Лосось на пару", calories: 190, protein: 20, fat: 12, carbs: 0 },
            { id: "10", name: "Гречка отварная", calories: 110, protein: 4, fat: 1, carbs: 21 }
        ];

        let products = [];
        let logs = [];

        // Инициализация данных
        function initApp() {
            const localProducts = localStorage.getItem('calorie_products');
            if (localProducts) {
                products = JSON.parse(localProducts);
            } else {
                products = [...DEFAULT_PRODUCTS];
                saveProductsToStorage();
            }

            const localLogs = localStorage.getItem('calorie_logs');
            if (localLogs) {
                logs = JSON.parse(localLogs);
            }

            updateSelectOptions();
            renderDiary();
            renderProductDatabase();
            renderHistory();
       }

        function saveProductsToStorage() {
            localStorage.setItem('calorie_products', JSON.stringify(products));
        }

        function saveLogsToStorage() {
            localStorage.setItem('calorie_logs', JSON.stringify(logs));
        }

        // Переключение табов
        function switchTab(tabId) {
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            if(tabId === 'diary') renderDiary();
            if(tabId === 'products') renderProductDatabase();
            if(tabId === 'history') renderHistory();
        }

        // Вспомогательная функция для получения текущей даты строкой (ГГГГ-ММ-ДД)
        function getTodayDate() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        // Обновление выпадающего списка продуктов в дневнике
        function updateSelectOptions() {
            const select = document.getElementById('log-product-select');
            select.innerHTML = '';
            
            // Сортировка по алфавиту для удобства
            const sortedProducts = [...products].sort((a,b) => a.name.localeCompare(b.name));

            sortedProducts.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.name} (${p.calories} ккал/100г)`;
                select.appendChild(opt);
            });
        }

        // РЕНДЕР: Дневник за сегодня
        function renderDiary() {
            const today = getTodayDate();
            const todayLogs = logs.filter(item => item.date === today);
            const listContainer = document.getElementById('diary-list');
            listContainer.innerHTML = '';

            let totalCal = 0, totalProt = 0, totalFat = 0, totalCarb = 0;

            if (todayLogs.length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; opacity:0.5; padding: 20px;">Сегодня вы еще ничего не добавили</p>`;
            } else {
                todayLogs.forEach(entry => {
                    totalCal += entry.calculatedCalories;
                    totalProt += entry.calculatedProtein;
                    totalFat += entry.calculatedFat;
                    totalCarb += entry.calculatedCarbs;

                    const card = document.createElement('div');
                    card.className = 'card-item';
                    card.innerHTML = `
                        <div class="card-info">
                            <div class="name">${entry.productName}</div>
                            <div class="details">${entry.weight}г • ${Math.round(entry.calculatedCalories)} ккал</div>
                            <div class="bju-badges">
                                <span class="badge badge-p">Б: ${entry.calculatedProtein.toFixed(1)}</span>
                                <span class="badge badge-f">Ж: ${entry.calculatedFat.toFixed(1)}</span>
                                <span class="badge badge-c">У: ${entry.calculatedCarbs.toFixed(1)}</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-danger" onclick="deleteLogEntry('${entry.id}')">Удалить</button>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            }

            // Обновление цифр сводки
            document.getElementById('total-calories').textContent = Math.round(totalCal);
            document.getElementById('total-protein').textContent = Math.round(totalProt) + ' г';
            document.getElementById('total-fat').textContent = Math.round(totalFat) + ' г';
            document.getElementById('total-carb').textContent = Math.round(totalCarb) + ' г';

            // Расчет Прогресс-баров (примем условную норму для красивого заполнения полос, например 2500ккал/100/70/300)
            // Но красивее сделать динамическое масштабирование от максимумов, либо стандартные фиксы
            document.getElementById('bar-protein').style.width = `${Math.min((totalProt / 120) * 100, 100)}%`;
            document.getElementById('bar-fat').style.width = `${Math.min((totalFat / 80) * 100, 100)}%`;
            document.getElementById('bar-carb').style.width = `${Math.min((totalCarb / 250) * 100, 100)}%`;
        }

        // ДОБАВИТЬ: Запись о еде в дневник
        function addLogEntry(e) {
            e.preventDefault();
            const productId = document.getElementById('log-product-select').value;
            const weight = parseFloat(document.getElementById('log-weight').value);
            const product = products.find(p => p.id === productId);

            if(!product || !weight) return;

            const ratio = weight / 100;

            const newEntry = {
                id: Date.now().toString(),
                date: getTodayDate(),
                productId: product.id,
                productName: product.name,
                weight: weight,
                calculatedCalories: product.calories * ratio,
                calculatedProtein: product.protein * ratio,
                calculatedFat: product.fat * ratio,
                calculatedCarbs: product.carbs * ratio
            };

            logs.unshift(newEntry);
            saveLogsToStorage();
            renderDiary();
            document.getElementById('add-log-form').reset();
        }

        // УДАЛИТЬ: Запись из дневника
        function deleteLogEntry(id) {
            logs = logs.filter(item => item.id !== id);
            saveLogsToStorage();
            renderDiary();
        }

        // РЕНДЕР: База продуктов (Блюд)
        function renderProductDatabase() {
            const listContainer = document.getElementById('database-list');
            const searchVal = document.getElementById('product-search').value.toLowerCase();
            listContainer.innerHTML = '';

            const filteredProducts = products.filter(p => p.name.toLowerCase().includes(searchVal));

            filteredProducts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card-item';
                card.innerHTML = `
                    <div class="card-info">
                        <div class="name">${p.name}</div>
                        <div class="details">${p.calories} ккал / 100г</div>
                        <div class="bju-badges">
                            <span class="badge badge-p">Б: ${p.protein}</span>
                            <span class="badge badge-f">Ж: ${p.fat}</span>
                            <span class="badge badge-c">У: ${p.carbs}</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="openEditModal('${p.id}')">✏️</button>
                        <button class="action-btn" onclick="deleteProduct('${p.id}')">🗑️</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // СОЗДАТЬ: Новое блюдо в базу
        function createNewProduct(e) {
            e.preventDefault();
            const name = document.getElementById('new-p-name').value;
            const calories = parseFloat(document.getElementById('new-p-cal').value);
            const protein = parseFloat(document.getElementById('new-p-prot').value);
            const fat = parseFloat(document.getElementById('new-p-fat').value);
            const carbs = parseFloat(document.getElementById('new-p-carb').value);

            const newProduct = {
                id: Date.now().toString(),
                name, calories, protein, fat, carbs
            };

            products.unshift(newProduct);
            saveProductsToStorage();
            updateSelectOptions();
            renderProductDatabase();
            document.getElementById('create-product-form').reset();
        }

        // УДАЛИТЬ: Продукт из базы
        function deleteProduct(id) {
            if(confirm('Вы уверены, что хотите удалить этот продукт из базы? Это не удалит его из уже сохраненной истории.')) {
                products = products.filter(p => p.id !== id);
                saveProductsToStorage();
                updateSelectOptions();
                renderProductDatabase();
            }
        }

        // МОДАЛКА: Открытие окна редактирования
        function openEditModal(id) {
            const product = products.find(p => p.id === id);
            if(!product) return;

            document.getElementById('edit-p-id').value = product.id;
            document.getElementById('edit-p-name').value = product.name;
            document.getElementById('edit-p-cal').value = product.calories;
            document.getElementById('edit-p-prot').value = product.protein;
            document.getElementById('edit-p-fat').value = product.fat;
            document.getElementById('edit-p-carb').value = product.carbs;

            document.getElementById('edit-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        // СОХРАНИТЬ: Изменения продукта после корректировки
        function saveProductEdit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-p-id').value;
            const name = document.getElementById('edit-p-name').value;
            const calories = parseFloat(document.getElementById('edit-p-cal').value);
            const protein = parseFloat(document.getElementById('edit-p-prot').value);
            const fat = parseFloat(document.getElementById('edit-p-fat').value);
            const carbs = parseFloat(document.getElementById('edit-p-carb').value);

            const index = products.findIndex(p => p.id === id);
            if(index !== -1) {
                products[index] = { id, name, calories, protein, fat, carbs };
                saveProductsToStorage();
                updateSelectOptions();
                renderProductDatabase();
                closeModal();
            }
        }

        // РЕНДЕР: История по дням
        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            if (logs.length === 0) {
                container.innerHTML = `<p style="text-align:center; opacity:0.5; padding: 20px;">История пуста</p>`;
                return;
            }

            // Группировка логов по датам
            const groups = {};
            logs.forEach(log => {
                if(!groups[log.date]) groups[log.date] = [];
                groups[log.date].push(log);
            });

            // Сортируем даты по убыванию (сначала свежие)
            const sortedDates = Object.keys(groups).sort((a,b) => b.localeCompare(a));

            sortedDates.forEach(date => {
                const dayLogs = groups[date];
                let dayCal = 0, dayP = 0, dayF = 0, dayC = 0;
                
                const itemsHtml = dayLogs.map(log => {
                    dayCal += log.calculatedCalories;
                    dayP += log.calculatedProtein;
                    dayF += log.calculatedFat;
                    dayC += log.calculatedCarbs;
                    return `<div style="font-size:0.85rem; margin-bottom:4px; opacity:0.8;">• ${log.productName}: ${log.weight}г (${Math.round(log.calculatedCalories)} ккал)</div>`;
                }).join('');

                // Красивое форматирование даты
                const formattedDate = new Date(date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

                const dayBlock = document.createElement('div');
                dayBlock.className = 'history-day';
                dayBlock.innerHTML = `
                    <div class="history-date">
                        <span>${formattedDate}</span>
                        <span style="color:#2C3E50;">${Math.round(dayCal)} ккал</span>
                    </div>
                    <div style="margin-bottom:8px;">${itemsHtml}</div>
                    <div class="bju-badges">
                        <span class="badge badge-p">Б: ${Math.round(dayP)}г</span>
                        <span class="badge badge-f">Ж: ${Math.round(dayF)}г</span>
                        <span class="badge badge-c">У: ${Math.round(dayC)}г</span>
                    </div>
                `;
                container.appendChild(dayBlock);
            });
        }

        // Запуск при загрузке страницы
        window.onload = initApp;
    </script>
</body>
</html>
